Railway · TOML
[build]
builder = "nixpacks"
 
[build.nixpacksPlan.phases.setup]
nixPkgs = ["nodejs_20", "python3", "gcc", "gnumake"]
 
[deploy]
startCommand = "node server.js"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
 
[[volumes]]
mountPath = "/app/uploads"
 